on: [push]

name: Continuous integration

jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - beta
          # - nightly
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo build

  release-build:
    name: Release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          #   binary_name: lumenarch
          #   archive_name: lumenarch-${{ github.sha }}-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: lumenarch.exe
            archive_name: lumenarch-${{ github.sha }}-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist
          binary="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            tar -czf "dist/${{ matrix.archive_name }}" -C "$(dirname "$binary")" "$(basename "$binary")"
          else
            powershell -Command "Compress-Archive -Path '$binary' -DestinationPath 'dist/${{ matrix.archive_name }}'"
          fi
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ matrix.archive_name }}
  
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actionshub/markdownlint@v3.1.4

  deploy-book:
    name: Deploy book
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To push a branch 
      pages: write  # To push to a GitHub Pages site
      id-token: write # To update the deployment status
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          tag=$(curl 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir bin
          curl -sSL $url | tar -xz --directory=bin
          echo "$(pwd)/bin" >> $GITHUB_PATH
      - name: Stage notes into mdBook source
        run: |
          mkdir -p docs/src/notes

          cat > docs/src/notes/README.md <<'EOF'
          # Notes

          This section contains implementation notes, vertical-slice plans, and TODO trackers
          from active development of LUMEN//ARCH.
          EOF

          find notes -maxdepth 1 -type f -name '*.md' -print0 | while IFS= read -r -d '' file; do
            cp "$file" "docs/src/notes/$(basename "$file")"
          done

          cp docs/src/SUMMARY.md docs/src/SUMMARY.md.bak
          {
            cat docs/src/SUMMARY.md.bak
            printf '\n- [Notes](./notes/README.md)\n'
            find notes -maxdepth 1 -type f -name '*.md' -printf '%f\n' \
              | sort -V \
              | while IFS= read -r name; do
                  stem="${name%.md}"
                  title="${stem//_/ }"
                  printf '  - [%s](./notes/%s)\n' "$title" "$name"
                done
          } > docs/src/SUMMARY.md
      - run: |
          cd docs
          mdbook build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/book'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    name: Publish commit release
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true
      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: commit-${{ github.sha }}
          name: Commit build ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          body: |
            Automated build artifacts for commit `${{ github.sha }}` on `${{ github.ref_name }}`.
          files: release-artifacts/*
